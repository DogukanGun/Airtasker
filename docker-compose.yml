version: "3.9"

services:
  # Local Ethereum node (Foundry anvil)
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337", "--block-time", "2"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Deploy contracts after anvil is healthy
  deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    depends_on:
      anvil:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./contracts:/app
    environment:
      - PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - RPC_URL=http://anvil:8545
    command: >
      sh -c "forge script script/Deploy.s.sol --rpc-url http://anvil:8545 --broadcast --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 &&
             cp deployments/local.json /deployments/local.json"
    volumes:
      - ./contracts:/app
      - deployments:/deployments

  # IPFS node (local)
  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      anvil:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - RPC_URL=http://anvil:8545
      - CHAIN_ID=31337
      - NETWORK_NAME=local
      - IPFS_API_URL=http://ipfs:5001
      - API_PORT=3001
      - JWT_SECRET=dev-secret-change-in-production
      - SUBMISSION_FEE_USDC=100000
      - REVIEW_FEE_USDC=50000
    volumes:
      - deployments:/deployments:ro
    env_file:
      - .env

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_RPC_URL=http://localhost:8545
      - NODE_ENV=production

volumes:
  ipfs_data:
  deployments:
